  # --- Evening (e.g. 18:00–21:59) ------------------------------------------
  rf_light_brightness_evening:
    name: "RF Light — Evening Brightness"
    min: 1
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-4
    initial: 50

  # rf_light_color_temp_evening:
  #   name: "RF Light — Evening Color Temp"
  #   min: 2000
  #   max: 6500
